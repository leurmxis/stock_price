name: Mission

on:
  schedule:
    - cron: '10 12 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4

    - name: set env
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: req
      run: |
        pip install akshare pandas pyarrow pytz duckdb

    - name: run
      run: |
        python data.py
        python clean.py

    - name: 提交并推送数据文件
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Auto update stock data: $(date +'%Y-%m-%d')" || exit 0
        git push
